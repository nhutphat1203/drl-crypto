settings:
  folder_path: "te1"
  log_path: "logs/"
  model_save_path: "models/ppo_finance_model"
  checkpoint_path: "checkpoints/"
  checkpoint_freq: 153600
  checkpoint_name_pfx: "model_checkpoint"
  best_model_save_path: "best_model"
  eval_freq: 15360
  tensorboard_log: "tensorboard/"
  device: "cpu"

model_env:
  window_size: 24
  initial_balance: 100000
  tick_per_episode: 46080
  seed: 28937

parameters:
  total_timesteps: 1843200 # 24 * 32 * 12 * 4 * 50 epoch
  learning_rate: 9e-5
  gamma: 0.995
  n_steps: 1536
  ent_coef: 0.011
  clip_range: 0.2
  n_epochs: 5
  batch_size: 256
  gae_lambda: 0.95
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02